<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">TechOut | متجر التكنولوجيا المستقبلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --accent-color: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--primary-bg);
            color: var(--text-main); 
            overflow-x: hidden;
            cursor: none; /* إخفاء المؤشر الافتراضي */
        }

        /* خلفية متحركة */
        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(30, 41, 59, 0.5) 0%, transparent 70%);
            z-index: -1;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* مؤشر الفأرة المخصص */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot {
            width: 8px; height: 8px;
            background-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }
        .cursor-outline {
            width: 40px; height: 40px;
            border: 2px solid rgba(99, 102, 241, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* تأثيرات البطاقات */
        .product-card {
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: translateY(40px);
        }
        .product-card.show {
            opacity: 1;
            transform: translateY(0);
        }
        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 35px var(--accent-glow);
            border-color: var(--accent-color);
        }
        .product-card img {
            transition: transform 0.7s ease;
        }
        .product-card:hover img {
            transform: scale(1.1);
        }

        /* شاشة التحميل */
        #loader {
            position: fixed;
            inset: 0;
            background: #030712;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .loader-ring {
            width: 80px; height: 80px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .flying-particle {
            position: fixed; pointer-events: none; z-index: 999;
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color), 0 0 40px var(--accent-color);
            border-radius: 50%;
            transition: all 0.85s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        /* تأثير النبض للأزرار */
        .btn-glow {
            position: relative;
        }
        .btn-glow::after {
            content: ''; position: absolute; inset: -4px;
            background: linear-gradient(45deg, #6366f1, #10b981, #3b82f6);
            filter: blur(10px); z-index: -1; opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-glow:hover::after { opacity: 0.7; }
    </style>
</head>
<body class="relative min-h-screen flex flex-col justify-between select-none">

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-outline" id="cursorOutline"></div>

    <div class="bg-animated"></div>

    <div id="loader">
        <div class="loader-ring mb-6"></div>
        <div class="text-4xl font-bold cyber-font tracking-[0.3em] text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500 animate-pulse">
            INITIALIZING...
        </div>
        <p class="mt-4 text-slate-500 text-sm tracking-widest uppercase">Connecting to TechOut Core Server</p>
    </div>

    <div id="settingsSidebar" class="fixed top-0 right-0 h-full w-80 glass-panel z-[90] transform translate-x-full transition-transform duration-500 p-8 flex flex-col justify-between shadow-2xl">
        <div>
            <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-4">
                <h2 class="cyber-font text-lg font-bold text-slate-200 tracking-wider flex items-center gap-2">⚙️ <span id="lblSettingsTitle">CONTROL PANEL</span></h2>
                <button onclick="toggleSettings()" class="text-slate-400 hover:text-red-400 text-2xl transition hover-target">&times;</button>
            </div>
            <div class="mb-8">
                <label class="block text-xs font-bold text-indigo-400 tracking-wider uppercase mb-3" id="lblLangSelect">اللغة / Language</label>
                <div class="flex flex-col gap-2">
                    <button onclick="changeLanguage('ar')" class="w-full text-right px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-800 hover:border-indigo-500 transition text-sm hover-target">العربية 🇸🇦</button>
                    <button onclick="changeLanguage('en')" class="w-full text-left px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-800 hover:border-indigo-500 transition text-sm hover-target">English 🇺🇸</button>
                </div>
            </div>
        </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center z-[85] hidden opacity-0 transition-opacity duration-500">
        <div class="glass-panel rounded-3xl w-full max-w-4xl mx-4 overflow-hidden p-6 md:p-8 relative shadow-[0_0_50px_rgba(99,102,241,0.2)] flex flex-col md:flex-row gap-8 border border-slate-800">
            <button onclick="closeProductModal()" class="absolute top-6 right-6 text-slate-400 hover:text-red-400 text-4xl transition z-10 hover-target">&times;</button>
            
            <div class="w-full md:w-1/2 flex items-center justify-center bg-slate-900/40 rounded-3xl p-4 border border-slate-800/50 relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-t from-indigo-900/20 to-transparent z-0"></div>
                <img id="modalImg" src="" class="w-full h-64 md:h-80 object-cover rounded-2xl z-10 transition-transform duration-700 group-hover:scale-105 shadow-2xl">
            </div>
            
            <div class="w-full md:w-1/2 flex flex-col justify-center">
                <div id="modalBadge" class="inline-block px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 w-max"></div>
                <h2 id="modalTitle" class="text-3xl font-bold text-white mb-3 leading-tight"></h2>
                <div id="modalPrice" class="text-3xl font-bold text-emerald-400 mb-6 cyber-font drop-shadow-md"></div>
                
                <div class="border-t border-slate-800/80 pt-4 mb-8">
                    <h4 class="text-sm font-bold text-indigo-400 mb-2 tracking-wide" id="lblModalDesc">المواصفات التقنية:</h4>
                    <p id="modalDesc" class="text-sm text-slate-300 leading-relaxed"></p>
                </div>
                
                <div class="flex gap-4 items-center">
                    <button id="modalActionBtn" class="flex-1 py-4 rounded-2xl bg-indigo-600 hover:bg-indigo-500 font-bold text-sm text-white transition shadow-[0_0_20px_rgba(99,102,241,0.4)] hover-target btn-glow"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed top-0 left-0 h-full w-80 glass-panel border-r border-slate-800 transform -translate-x-full transition-transform duration-500 z-50 flex flex-col justify-between shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-lg font-bold text-white" id="lblCartTitle">🛒 سلة المشتريات</h2>
            <button onclick="toggleCart()" class="text-slate-400 hover:text-red-400 font-bold text-2xl transition hover-target">&times;</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-3 hide-scroll"></div>
        <div class="p-6 border-t border-slate-800 bg-slate-900/50">
            <div class="flex justify-between text-white font-bold mb-4 text-sm">
                <span id="lblTotal">الإجمالي:</span>
                <span id="cartTotal" class="text-emerald-400 cyber-font text-lg drop-shadow-md">0 EGP</span>
            </div>
            <button onclick="openCheckoutModal()" id="btnCheckout" class="w-full bg-emerald-600 text-white py-4 rounded-xl text-sm font-bold hover:bg-emerald-500 transition shadow-[0_0_15px_rgba(16,185,129,0.4)] btn-glow hover-target">المرور للدفع الآمن</button>
        </div>
    </div>

    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 border-b border-slate-800/80">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="cyber-font text-3xl font-bold bg-gradient-to-r from-indigo-400 via-purple-400 to-emerald-400 bg-clip-text text-transparent cursor-pointer tracking-wider hover-target hover:scale-105 transition-transform" onclick="resetToHome()">TechOut</div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleSettings()" class="p-3 bg-slate-900/80 rounded-full border border-slate-700 hover:border-indigo-500 hover:bg-indigo-500/20 transition hover-target shadow-lg">⚙️</button>
                <button id="cartBadgeParent" onclick="toggleCart()" class="relative p-3 bg-slate-900/80 rounded-full border border-slate-700 hover:border-indigo-500 hover:bg-indigo-500/20 transition hover-target shadow-lg">
                    🛒 <span id="cartBadge" class="absolute -top-1 -right-1 bg-indigo-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold shadow-[0_0_10px_rgba(99,102,241,0.8)]">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="glass-panel border-b border-slate-800/80 sticky top-[73px] z-30 bg-slate-900/60">
        <div class="max-w-7xl mx-auto px-6 py-4 flex gap-3 overflow-x-auto hide-scroll whitespace-nowrap text-xs font-bold" id="categoryBar"></div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12 flex-1 w-full">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="productGrid"></div>
    </main>

    <div id="checkoutModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center z-[95] hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel rounded-3xl w-full max-w-md mx-4 p-8 relative border border-slate-700 shadow-[0_0_40px_rgba(99,102,241,0.2)]">
            <button onclick="closeCheckoutModal()" class="absolute top-4 right-4 text-slate-400 hover:text-red-400 text-3xl transition hover-target">&times;</button>
            <h3 class="text-2xl font-bold text-center text-white mb-8 cyber-font tracking-wider">SECURE CHECKOUT</h3>
            <form id="paymentForm" class="space-y-5" onsubmit="executePayment(event)">
                <input id="cardNameInput" type="text" placeholder="اسم صاحب البطاقة" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition shadow-inner">
                <input id="cardNumberInput" type="text" placeholder="رقم البطاقة الائتمانية" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white cyber-font focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition shadow-inner tracking-widest">
                <div class="grid grid-cols-2 gap-4">
                    <input id="cardExpiryInput" type="text" placeholder="MM/YY" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white text-center focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
                    <input id="cardCvvInput" type="password" placeholder="CVV" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white text-center focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 rounded-xl font-bold text-sm hover:from-indigo-500 hover:to-purple-500 transition shadow-[0_0_20px_rgba(99,102,241,0.5)] mt-4 btn-glow hover-target">تأكيد عملية الشراء</button>
            </form>
        </div>
    </div>

    <script>
        // إعدادات الماوس المخصص
        const dot = document.getElementById("cursorDot");
        const outline = document.getElementById("cursorOutline");
        window.addEventListener("mousemove", function(e) {
            dot.style.left = e.clientX + "px";
            dot.style.top = e.clientY + "px";
            // تأثير تأخير بسيط للإطار
            setTimeout(() => {
                outline.style.left = e.clientX + "px";
                outline.style.top = e.clientY + "px";
            }, 50);
        });

        // تأثير الماوس على العناصر القابلة للنقر
        document.addEventListener("mouseover", function(e) {
            if(e.target.closest('.hover-target') || e.target.closest('button')) {
                outline.style.transform = "translate(-50%, -50%) scale(1.5)";
                outline.style.backgroundColor = "rgba(99, 102, 241, 0.1)";
            }
        });
        document.addEventListener("mouseout", function(e) {
            outline.style.transform = "translate(-50%, -50%) scale(1)";
            outline.style.backgroundColor = "transparent";
        });

        // إخفاء شاشة التحميل
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                observeCards(); // تفعيل المراقب بعد التحميل
            }, 2000);
        });

        // البيانات والمنتجات (مع صور حقيقية ومذهلة)
        const dict = {
            ar: {
                title: "TechOut | متجر التكنولوجيا المستقبلي", settings: "لوحة التحكم",
                cartTitle: "🛒 سلة المشتريات", total: "الإجمالي:", checkout: "إتمام الدفع الآمن",
                addToCart: "إضافة للسلة", descTitle: "المواصفات التقنية:",
                cats: { all: "الكل", phones: "هواتف", laptops: "لابتوب", gaming: "ألعاب", smarthome: "المنزل الذكي" }
            },
            en: {
                title: "TechOut | Future Tech", settings: "CONTROL PANEL",
                cartTitle: "🛒 Shopping Cart", total: "Total:", checkout: "Secure Checkout",
                addToCart: "Add to Cart", descTitle: "Tech Specs:",
                cats: { all: "All", phones: "Phones", laptops: "Laptops", gaming: "Gaming", smarthome: "Smart Home" }
            }
        };

        const baseTechData = {
            phones: [
                { ar: "Apple iPhone 15 Pro Max", en: "Apple iPhone 15 Pro Max", brand: "Apple", price: 62000, img: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=800&auto=format&fit=crop", desc_ar: "هيكل من التيتانيوم، شريحة A17 Pro، كاميرا خرافية.", desc_en: "Titanium design, A17 Pro chip, pro camera system." },
                { ar: "Samsung Galaxy S24 Ultra", en: "Samsung Galaxy S24 Ultra", brand: "Samsung", price: 58000, img: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=800&auto=format&fit=crop", desc_ar: "مدعوم بالذكاء الاصطناعي مع قلم S-Pen مدمج.", desc_en: "Galaxy AI powered with built-in S-Pen." }
            ],
            laptops: [
                { ar: "MacBook Pro 16 M3 Max", en: "MacBook Pro 16 M3 Max", brand: "Apple", price: 145000, img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=800&auto=format&fit=crop", desc_ar: "قوة لا تضاهى للمحترفين بشاشة XDR مذهلة.", desc_en: "Unrivaled pro power with Liquid Retina XDR." },
                { ar: "Razer Blade 16 Gaming", en: "Razer Blade 16 Gaming", brand: "Razer", price: 120000, img: "https://images.unsplash.com/photo-1593640408182-31c70c8268f5?q=80&w=800&auto=format&fit=crop", desc_ar: "وحش الألعاب بمعالج Core i9 وكرت شاشة 4090.", desc_en: "Gaming beast with Core i9 and RTX 4090." }
            ],
            gaming: [
                { ar: "Nvidia GeForce RTX 4090", en: "Nvidia GeForce RTX 4090", brand: "Nvidia", price: 85000, img: "https://images.unsplash.com/photo-1587202372634-32705e3bf49c?q=80&w=800&auto=format&fit=crop", desc_ar: "أقوى كرت شاشة في العالم بتقنية DLSS 3.", desc_en: "The ultimate GPU featuring DLSS 3 technology." },
                { ar: "PlayStation 5 Pro", en: "PlayStation 5 Pro", brand: "Sony", price: 32000, img: "https://images.unsplash.com/photo-1606813907291-d86efa9b94db?q=80&w=800&auto=format&fit=crop", desc_ar: "تجربة لعب خيالية بدقة 4K ومعدل إطارات مبهر.", desc_en: "Next-gen gaming experience in 4K resolution." }
            ],
            smarthome: [
                { ar: "Google Nest Hub Max", en: "Google Nest Hub Max", brand: "Google", price: 9500, img: "https://images.unsplash.com/photo-1558089687-f282ffcbc126?q=80&w=800&auto=format&fit=crop", desc_ar: "مساعد منزلي ذكي للتحكم الكامل بالإضاءة والكاميرات.", desc_en: "Smart home assistant to control lights and security." },
                { ar: "Sony WH-1000XM5", en: "Sony WH-1000XM5", brand: "Sony", price: 16000, img: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?q=80&w=800&auto=format&fit=crop", desc_ar: "أفضل سماعات عزل ضوضاء لاسلكية في العالم.", desc_en: "Industry-leading noise canceling wireless headphones." }
            ]
        };

        let products = [];
        let cart = [];
        let currentLang = 'ar';
        let currentCategory = 'all';

        // تجميع المنتجات
        let idCounter = 1;
        Object.keys(baseTechData).forEach(cat => {
            baseTechData[cat].forEach(item => {
                products.push({
                    id: idCounter++,
                    category: cat, brand: item.brand, price: item.price, img: item.img,
                    ar_title: item.ar, en_title: item.en,
                    desc_ar: item.desc_ar, desc_en: item.desc_en
                });
            });
        });

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('lblCartTitle').innerText = dict[lang].cartTitle;
            document.getElementById('lblTotal').innerText = dict[lang].total;
            document.getElementById('btnCheckout').innerText = dict[lang].checkout;
            renderCategoriesBar();
            renderProducts();
            updateCartUI();
        }

        function renderCategoriesBar() {
            const bar = document.getElementById('categoryBar');
            const cats = dict[currentLang].cats;
            bar.innerHTML = Object.keys(cats).map(key => `
                <button onclick="filterCategory('${key}')" class="px-6 py-2.5 rounded-full transition-all duration-300 hover-target ${currentCategory === key ? 'bg-indigo-600 text-white shadow-[0_0_15px_rgba(99,102,241,0.5)] transform scale-105' : 'bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 border border-slate-700'}">
                    ${cats[key]}
                </button>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderCategoriesBar();
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            let filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="glass-panel product-card rounded-2xl overflow-hidden p-5 flex flex-col justify-between cursor-pointer hover-target" onclick="openProductModal(${p.id}, event)">
                        <div>
                            <div class="relative w-full h-48 bg-slate-900 rounded-xl overflow-hidden mb-4 border border-slate-700/50 flex items-center justify-center group">
                                <img src="${p.img}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-indigo-600/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            </div>
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] text-indigo-400 uppercase font-bold tracking-widest bg-indigo-950/50 px-2 py-1 rounded-md border border-indigo-900/50">${p.brand}</span>
                            </div>
                            <h3 class="font-bold text-sm text-white mb-3 leading-snug">${p[`${currentLang}_title`]}</h3>
                        </div>
                        <div class="flex justify-between items-center mt-2 pt-4 border-t border-slate-700/50">
                            <span class="text-lg font-bold text-emerald-400 cyber-font drop-shadow-md">${p.price.toLocaleString()} EGP</span>
                            <button onclick="handleAddToCart(this, ${p.id}, event)" class="bg-indigo-600 hover:bg-indigo-500 text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg shadow-[0_0_10px_rgba(99,102,241,0.5)] transition hover-target z-20 btn-glow">🛒</button>
                        </div>
                    </div>
                `;
            });
            setTimeout(observeCards, 50); // إعادة تفعيل المراقب للعناصر الجديدة
        }

        // تأثيرات التمرير (Scroll Reveal)
        function observeCards() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        entry.target.classList.add('show');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.product-card').forEach(card => observer.observe(card));
        }

        function handleAddToCart(buttonEl, productId, event) {
            event.stopPropagation(); 
            const product = products.find(p => p.id === productId);
            if (product) {
                cart.push(product);
                updateCartUI();
                
                // تأثير طيران المنتج للسلة
                const cartBadge = document.getElementById('cartBadgeParent');
                const buttonRect = buttonEl.getBoundingClientRect();
                const cartRect = cartBadge.getBoundingClientRect();
                const particle = document.createElement('div');
                particle.className = "flying-particle";
                particle.style.width = "15px"; particle.style.height = "15px";
                particle.style.left = `${buttonRect.left}px`; particle.style.top = `${buttonRect.top}px`;
                document.body.appendChild(particle);

                requestAnimationFrame(() => {
                    particle.style.left = `${cartRect.left}px`;
                    particle.style.top = `${cartRect.top}px`;
                });
                setTimeout(() => {
                    particle.remove();
                    cartBadge.style.transform = "scale(1.3)";
                    setTimeout(() => cartBadge.style.transform = "scale(1)", 200);
                }, 800);
            }
        }

        function updateCartUI() {
            document.getElementById('cartBadge').innerText = cart.length;
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex items-center gap-3 bg-slate-900/80 p-3 rounded-xl border border-slate-700/50 shadow-inner group">
                        <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover border border-slate-700">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-white text-xs font-bold truncate">${item[`${currentLang}_title`]}</h4>
                            <span class="text-emerald-400 text-xs font-bold cyber-font">${item.price.toLocaleString()} EGP</span>
                        </div>
                        <button onclick="cart.splice(${index},1); updateCartUI();" class="text-slate-500 hover:text-red-500 font-bold text-lg hover-target">&times;</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').innerText = total.toLocaleString() + ' EGP';
        }

        function toggleSettings() { document.getElementById('settingsSidebar').classList.toggle('translate-x-full'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('-translate-x-full'); }

        function openProductModal(id) {
            const p = products.find(p => p.id === id);
            if(!p) return;
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalTitle').innerText = p[`${currentLang}_title`];
            document.getElementById('modalPrice').innerText = p.price.toLocaleString() + ' EGP';
            document.getElementById('modalDesc').innerText = p[`desc_${currentLang}`];
            document.getElementById('modalBadge').innerText = p.brand;
            document.getElementById('modalBadge').className = "inline-block px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest mb-4 bg-indigo-900/50 text-indigo-400 border border-indigo-700/50 shadow-inner";
            
            const btn = document.getElementById('modalActionBtn');
            btn.innerText = dict[currentLang].addToCart;
            btn.onclick = (e) => { handleAddToCart(btn, p.id, e); closeProductModal(); };
            
            const modal = document.getElementById('productModal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeProductModal() {
            const modal = document.getElementById('productModal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 500);
        }

        function openCheckoutModal() {
            if(cart.length === 0) return alert(currentLang === 'ar' ? "السلة فارغة!" : "Cart is empty!");
            const modal = document.getElementById('checkoutModal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeCheckoutModal() {
            const modal = document.getElementById('checkoutModal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function executePayment(e) {
            e.preventDefault();
            const name = document.getElementById('cardNameInput').value;
            const number = document.getElementById('cardNumberInput').value;
            const expiry = document.getElementById('cardExpiryInput').value;
            const cvv = document.getElementById('cardCvvInput').value;

            fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, number, expiry, cvv })
            }).then(res => res.json()).then(data => {
                alert(currentLang === 'ar' ? "تمت عملية الشراء بنجاح!" : "Payment successful!");
                cart = []; updateCartUI(); closeCheckoutModal();
                if(!document.getElementById('cartSidebar').classList.contains('-translate-x-full')) toggleCart();
            }).catch(err => alert("حدث خطأ في الاتصال بالخادم."));
        }

        function resetToHome() {
            filterCategory('all');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        changeLanguage('ar');
    </script>
</body>
</html>
