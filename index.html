<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">TechOut | متجر التكنولوجيا المستقبلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text-main: #f8fafc;
            /* المتغيرات الافتراضية (اللون السيبراني - Indigo) */
            --accent-color: #6366f1;
            --accent-rgb: 99, 102, 241;
            --accent-glow: rgba(99, 102, 241, 0.4);
        }

        /* الثيم الأخضر (Matrix) */
        [data-theme="matrix"] {
            --accent-color: #10b981;
            --accent-rgb: 16, 185, 129;
            --accent-glow: rgba(16, 185, 129, 0.4);
        }

        /* الثيم البنفسجي (Neon Punk) */
        [data-theme="neon"] {
            --accent-color: #d946ef;
            --accent-rgb: 217, 70, 239;
            --accent-glow: rgba(217, 70, 239, 0.4);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--primary-bg);
            color: var(--text-main); 
            overflow-x: hidden;
            cursor: none; 
        }

        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(var(--accent-rgb), 0.15) 0%, transparent 70%);
            z-index: -1;
            transition: background 0.5s ease;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .cursor-dot, .cursor-outline {
            position: fixed; top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 9999; pointer-events: none;
        }
        .cursor-dot {
            width: 8px; height: 8px;
            background-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: background-color 0.3s;
        }
        .cursor-outline {
            width: 40px; height: 40px;
            border: 2px solid rgba(var(--accent-rgb), 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.3s;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .product-card {
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0; transform: translateY(40px);
        }
        .product-card.show { opacity: 1; transform: translateY(0); }
        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 35px var(--accent-glow);
            border-color: var(--accent-color);
        }
        .product-card img { transition: transform 0.7s ease; }
        .product-card:hover img { transform: scale(1.1); }

        #loader {
            position: fixed; inset: 0; background: #030712; z-index: 10000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .loader-ring {
            width: 80px; height: 80px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .btn-glow { position: relative; }
        .btn-glow::after {
            content: ''; position: absolute; inset: -4px;
            background: var(--accent-color);
            filter: blur(10px); z-index: -1; opacity: 0; transition: opacity 0.3s;
        }
        .btn-glow:hover::after { opacity: 0.7; }
        
        .dynamic-bg { background-color: var(--accent-color) !important; }
        .dynamic-text { color: var(--accent-color) !important; }
        .dynamic-border { border-color: var(--accent-color) !important; }

        /* الإشعارات (Toasts) */
        #toastContainer { position: fixed; bottom: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            min-width: 250px; padding: 16px 20px; border-radius: 12px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            border-left: 4px solid var(--accent-color);
            color: white; font-weight: bold; font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease forwards, fadeOut 0.3s ease 3s forwards;
        }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(20px); } }
    </style>
</head>
<body class="relative min-h-screen flex flex-col justify-between select-none" data-theme="cyber">

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-outline" id="cursorOutline"></div>
    <div class="bg-animated"></div>
    <div id="toastContainer"></div>

    <div id="loader">
        <div class="loader-ring mb-6"></div>
        <div class="text-4xl font-bold cyber-font tracking-[0.3em] dynamic-text animate-pulse">INITIALIZING...</div>
    </div>

    <div id="settingsSidebar" class="fixed top-0 right-0 h-full w-80 glass-panel z-[90] transform translate-x-full transition-transform duration-500 p-8 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h2 class="cyber-font text-lg font-bold text-slate-200 tracking-wider">⚙️ <span id="lblSettingsTitle">CONTROL PANEL</span></h2>
            <button onclick="toggleSettings()" class="text-slate-400 hover:text-red-400 text-2xl hover-target">&times;</button>
        </div>
        
        <div class="mb-8">
            <label class="block text-xs font-bold dynamic-text tracking-wider uppercase mb-3">اللغة / Language</label>
            <div class="flex flex-col gap-2">
                <button onclick="changeLanguage('ar')" class="w-full text-right px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-800 hover:border-indigo-500 transition text-sm hover-target">العربية 🇸🇦</button>
                <button onclick="changeLanguage('en')" class="w-full text-left px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-800 hover:border-indigo-500 transition text-sm hover-target">English 🇺🇸</button>
            </div>
        </div>

        <div class="mb-8">
            <label class="block text-xs font-bold dynamic-text tracking-wider uppercase mb-3" id="lblThemeTitle">المظهر / Theme</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTheme('cyber')" class="h-10 rounded-xl bg-[#030712] border-2 border-[#6366f1] hover-target" title="Cyber Blue"></button>
                <button onclick="setTheme('matrix')" class="h-10 rounded-xl bg-[#030712] border-2 border-[#10b981] hover-target" title="Matrix Green"></button>
                <button onclick="setTheme('neon')" class="h-10 rounded-xl bg-[#030712] border-2 border-[#d946ef] hover-target" title="Neon Punk"></button>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center z-[95] hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel rounded-3xl w-full max-w-md mx-4 p-8 relative border border-slate-700 shadow-2xl">
            <button onclick="toggleAuthModal()" class="absolute top-4 right-4 text-slate-400 hover:text-red-400 text-3xl hover-target">&times;</button>
            
            <div class="flex gap-4 mb-8 border-b border-slate-700 pb-2">
                <button id="tabLogin" onclick="switchAuthTab('login')" class="flex-1 text-center font-bold pb-2 dynamic-text border-b-2 dynamic-border hover-target">تسجيل الدخول</button>
                <button id="tabRegister" onclick="switchAuthTab('register')" class="flex-1 text-center font-bold pb-2 text-slate-400 border-b-2 border-transparent hover-target">إنشاء حساب</button>
            </div>

            <form id="formLogin" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500">
                <input type="password" id="loginPass" placeholder="كلمة المرور" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500">
                <button type="submit" class="w-full dynamic-bg text-white py-3 rounded-xl font-bold text-sm btn-glow hover-target mt-4">دخول</button>
            </form>

            <form id="formRegister" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                <input type="text" id="regUser" placeholder="اسم المستخدم" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500">
                <input type="password" id="regPass" placeholder="كلمة المرور" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500">
                <button type="submit" class="w-full dynamic-bg text-white py-3 rounded-xl font-bold text-sm btn-glow hover-target mt-4">تسجيل</button>
            </form>
        </div>
    </div>

    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 border-b border-slate-800/80">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="cyber-font text-3xl font-bold bg-clip-text text-transparent dynamic-text cursor-pointer tracking-wider hover-target hover:scale-105 transition-transform" onclick="resetToHome()">TechOut</div>
            
            <div class="flex items-center gap-4">
                <div id="userSection" class="hidden items-center gap-3 mr-4">
                    <span id="userNameDisplay" class="text-sm font-bold text-white bg-slate-800 px-4 py-2 rounded-full border border-slate-700"></span>
                    <button onclick="handleLogout()" class="text-xs text-red-400 hover:text-red-300 font-bold hover-target">خروج</button>
                </div>
                <button id="btnLoginNav" onclick="toggleAuthModal()" class="text-sm font-bold bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-full border border-slate-600 transition hover-target">تسجيل الدخول</button>

                <button onclick="toggleSettings()" class="p-3 bg-slate-900/80 rounded-full border border-slate-700 hover:border-indigo-500 transition hover-target">⚙️</button>
                <button id="cartBadgeParent" onclick="toggleCart()" class="relative p-3 bg-slate-900/80 rounded-full border border-slate-700 hover:border-indigo-500 transition hover-target">
                    🛒 <span id="cartBadge" class="absolute -top-1 -right-1 dynamic-bg text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="glass-panel border-b border-slate-800/80 sticky top-[73px] z-30 bg-slate-900/60">
        <div class="max-w-7xl mx-auto px-6 py-4 flex gap-3 overflow-x-auto hide-scroll whitespace-nowrap text-xs font-bold" id="categoryBar"></div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12 flex-1 w-full">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="productGrid"></div>
    </main>

    <div id="cartSidebar" class="fixed top-0 left-0 h-full w-80 glass-panel border-r border-slate-800 transform -translate-x-full transition-transform duration-500 z-50 flex flex-col justify-between shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-lg font-bold text-white" id="lblCartTitle">🛒 سلة المشتريات</h2>
            <button onclick="toggleCart()" class="text-slate-400 hover:text-red-400 font-bold text-2xl hover-target">&times;</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-3 hide-scroll"></div>
        <div class="p-6 border-t border-slate-800 bg-slate-900/50">
            <div class="flex justify-between text-white font-bold mb-4 text-sm">
                <span id="lblTotal">الإجمالي:</span>
                <span id="cartTotal" class="dynamic-text cyber-font text-lg drop-shadow-md">0 EGP</span>
            </div>
            <button onclick="openCheckoutModal()" id="btnCheckout" class="w-full dynamic-bg text-white py-4 rounded-xl text-sm font-bold btn-glow hover-target">المرور للدفع الآمن</button>
        </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center z-[85] hidden opacity-0 transition-opacity duration-500">
        <div class="glass-panel rounded-3xl w-full max-w-4xl mx-4 overflow-hidden p-6 md:p-8 relative flex flex-col md:flex-row gap-8 border border-slate-800">
            <button onclick="closeProductModal()" class="absolute top-6 right-6 text-slate-400 hover:text-red-400 text-4xl hover-target z-10">&times;</button>
            <div class="w-full md:w-1/2 flex items-center justify-center bg-slate-900/40 rounded-3xl p-4 border border-slate-800/50 relative overflow-hidden">
                <img id="modalImg" src="" class="w-full h-64 md:h-80 object-cover rounded-2xl z-10 shadow-2xl">
            </div>
            <div class="w-full md:w-1/2 flex flex-col justify-center">
                <div id="modalBadge" class="inline-block px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 w-max border dynamic-border dynamic-text"></div>
                <h2 id="modalTitle" class="text-3xl font-bold text-white mb-3"></h2>
                <div id="modalPrice" class="text-3xl font-bold dynamic-text mb-6 cyber-font"></div>
                <div class="border-t border-slate-800/80 pt-4 mb-8">
                    <h4 class="text-sm font-bold dynamic-text mb-2" id="lblModalDesc">المواصفات التقنية:</h4>
                    <p id="modalDesc" class="text-sm text-slate-300 leading-relaxed"></p>
                </div>
                <button id="modalActionBtn" class="w-full py-4 rounded-2xl dynamic-bg font-bold text-sm text-white btn-glow hover-target"></button>
            </div>
        </div>
    </div>

    <div id="checkoutModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center z-[95] hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel rounded-3xl w-full max-w-md mx-4 p-8 relative border border-slate-700">
            <button onclick="closeCheckoutModal()" class="absolute top-4 right-4 text-slate-400 hover:text-red-400 text-3xl hover-target">&times;</button>
            <h3 class="text-2xl font-bold text-center text-white mb-8 cyber-font">SECURE CHECKOUT</h3>
            <form id="paymentForm" class="space-y-5" onsubmit="executePayment(event)">
                <input id="cardNameInput" type="text" placeholder="اسم صاحب البطاقة" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white focus:outline-none focus:border-indigo-500">
                <input id="cardNumberInput" type="text" placeholder="رقم البطاقة الائتمانية" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white cyber-font focus:outline-none focus:border-indigo-500 tracking-widest">
                <div class="grid grid-cols-2 gap-4">
                    <input id="cardExpiryInput" type="text" placeholder="MM/YY" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white text-center focus:border-indigo-500">
                    <input id="cardCvvInput" type="password" placeholder="CVV" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-4 text-sm text-white text-center focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full dynamic-bg text-white py-4 rounded-xl font-bold text-sm btn-glow hover-target mt-4">تأكيد الدفع</button>
            </form>
        </div>
    </div>

    <script>
        // --- الأساسيات والتأثيرات ---
        const dot = document.getElementById("cursorDot");
        const outline = document.getElementById("cursorOutline");
        window.addEventListener("mousemove", (e) => {
            dot.style.left = e.clientX + "px"; dot.style.top = e.clientY + "px";
            setTimeout(() => { outline.style.left = e.clientX + "px"; outline.style.top = e.clientY + "px"; }, 50);
        });
        document.addEventListener("mouseover", (e) => {
            if(e.target.closest('.hover-target') || e.target.closest('button') || e.target.closest('input')) {
                outline.style.transform = "translate(-50%, -50%) scale(1.5)";
                outline.style.backgroundColor = "var(--accent-glow)";
            }
        });
        document.addEventListener("mouseout", () => {
            outline.style.transform = "translate(-50%, -50%) scale(1)";
            outline.style.backgroundColor = "transparent";
        });

        // --- الإشعارات (Toast) ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'error' ? '#ef4444' : 'var(--accent-color)';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // --- الثيمات (Themes) ---
        function setTheme(themeName) {
            document.body.setAttribute('data-theme', themeName);
            localStorage.setItem('techout_theme', themeName);
            showToast(currentLang === 'ar' ? "تم تغيير المظهر بنجاح" : "Theme updated successfully");
        }
        const savedTheme = localStorage.getItem('techout_theme') || 'cyber';
        document.body.setAttribute('data-theme', savedTheme);

        // --- المصادقة (Auth) ---
        function checkAuthStatus() {
            fetch('/api/check_auth').then(res => res.json()).then(data => {
                if(data.logged_in) {
                    document.getElementById('btnLoginNav').classList.add('hidden');
                    document.getElementById('userSection').classList.remove('hidden');
                    document.getElementById('userSection').classList.add('flex');
                    document.getElementById('userNameDisplay').innerText = data.username;
                } else {
                    document.getElementById('btnLoginNav').classList.remove('hidden');
                    document.getElementById('userSection').classList.add('hidden');
                    document.getElementById('userSection').classList.remove('flex');
                }
            });
        }

        function toggleAuthModal() {
            const modal = document.getElementById('authModal');
            if(modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.remove('opacity-0'), 10);
            } else {
                modal.classList.add('opacity-0');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function switchAuthTab(tab) {
            const loginForm = document.getElementById('formLogin');
            const regForm = document.getElementById('formRegister');
            const tabLogin = document.getElementById('tabLogin');
            const tabReg = document.getElementById('tabRegister');

            if(tab === 'login') {
                loginForm.classList.remove('hidden'); regForm.classList.add('hidden');
                tabLogin.classList.replace('text-slate-400', 'dynamic-text');
                tabLogin.classList.replace('border-transparent', 'dynamic-border');
                tabReg.classList.replace('dynamic-text', 'text-slate-400');
                tabReg.classList.replace('dynamic-border', 'border-transparent');
            } else {
                regForm.classList.remove('hidden'); loginForm.classList.add('hidden');
                tabReg.classList.replace('text-slate-400', 'dynamic-text');
                tabReg.classList.replace('border-transparent', 'dynamic-border');
                tabLogin.classList.replace('dynamic-text', 'text-slate-400');
                tabLogin.classList.replace('dynamic-border', 'border-transparent');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            }).then(res => res.json()).then(data => {
                if(data.success) { showToast(data.message); toggleAuthModal(); checkAuthStatus(); }
                else showToast(data.message, 'error');
            });
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            fetch('/api/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            }).then(res => res.json()).then(data => {
                if(data.success) { showToast(data.message); toggleAuthModal(); checkAuthStatus(); }
                else showToast(data.message, 'error');
            });
        }

        function handleLogout() {
            fetch('/api/logout', { method: 'POST' }).then(res => res.json()).then(data => {
                showToast(data.message); checkAuthStatus();
            });
        }

        // --- البيانات والمنتجات (100+ منتج) ---
        const dict = {
            ar: {
                cats: { all: "الكل", phones: "هواتف", laptops: "لابتوب", gaming: "ألعاب", smarthome: "المنزل الذكي" }
            },
            en: {
                cats: { all: "All", phones: "Phones", laptops: "Laptops", gaming: "Gaming", smarthome: "Smart Home" }
            }
        };

        // المنتجات الأساسية الواقعية
        const baseTechData = [
            { category: "phones", brand: "Apple", price: 62000, img: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=800", ar: "Apple iPhone 15 Pro Max", en: "Apple iPhone 15 Pro Max", desc_ar: "هيكل من التيتانيوم، شريحة A17 Pro.", desc_en: "Titanium design, A17 Pro chip." },
            { category: "phones", brand: "Samsung", price: 58000, img: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=800", ar: "Samsung Galaxy S24 Ultra", en: "Samsung Galaxy S24 Ultra", desc_ar: "مدعوم بالذكاء الاصطناعي مع قلم S-Pen.", desc_en: "Galaxy AI powered with S-Pen." },
            { category: "laptops", brand: "Apple", price: 145000, img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=800", ar: "MacBook Pro 16 M3 Max", en: "MacBook Pro 16 M3 Max", desc_ar: "قوة لا تضاهى للمحترفين بشاشة XDR.", desc_en: "Unrivaled pro power with Liquid Retina XDR." },
            { category: "gaming", brand: "Nvidia", price: 85000, img: "https://images.unsplash.com/photo-1587202372634-32705e3bf49c?q=80&w=800", ar: "Nvidia GeForce RTX 4090", en: "Nvidia GeForce RTX 4090", desc_ar: "أقوى كرت شاشة في العالم بتقنية DLSS 3.", desc_en: "Ultimate GPU featuring DLSS 3." },
            { category: "smarthome", brand: "Sony", price: 16000, img: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?q=80&w=800", ar: "Sony WH-1000XM5", en: "Sony WH-1000XM5", desc_ar: "سماعات عزل ضوضاء لاسلكية.", desc_en: "Noise canceling wireless headphones." }
        ];

        let products = [];
        let idCounter = 1;

        // إضافة المنتجات الأساسية
        baseTechData.forEach(item => {
            products.push({ id: idCounter++, ...item });
        });

        // خوارزمية توليد 100+ منتج إضافي لضمان امتلاء المتجر باحترافية
        const catMap = ['phones', 'laptops', 'gaming', 'smarthome'];
        const brandsMap = ['Asus', 'Razer', 'Logitech', 'Xiaomi', 'Oppo', 'Lenovo', 'Dell', 'LG', 'Corsair'];
        const suffixes = ['Pro', 'Max', 'Ultra', 'Elite', 'Lite', 'X', 'Plus', 'Gaming Edition', 'Geniun'];
        
        for(let i = 0; i < 97; i++) {
            const cat = catMap[i % 4];
            const brand = brandsMap[i % brandsMap.length];
            const suffix = suffixes[i % suffixes.length];
            const price = Math.floor(Math.random() * 90000) + 5000;
            
            // صور عامة تناسب الأقسام من Unsplash
            const imgGenerators = {
                'phones': `https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800&auto=format&fit=crop&sig=${i}`,
                'laptops': `https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=800&auto=format&fit=crop&sig=${i}`,
                'gaming': `https://images.unsplash.com/photo-1593640495253-23196b27a87f?q=80&w=800&auto=format&fit=crop&sig=${i}`,
                'smarthome': `https://images.unsplash.com/photo-1558089687-f282ffcbc126?q=80&w=800&auto=format&fit=crop&sig=${i}`
            };

            products.push({
                id: idCounter++, category: cat, brand: brand, price: price, img: imgGenerators[cat],
                ar: `${brand} Smart Device ${suffix} - Gen ${i+1}`,
                en: `${brand} Smart Device ${suffix} - Gen ${i+1}`,
                desc_ar: `إصدار ${suffix} الجديد كلياً، يأتي بأحدث التقنيات وأداء مذهل في فئته.`,
                desc_en: `The all-new ${suffix} edition, featuring state-of-art technology and performance.`
            });
        }

        let cart = [];
        let currentLang = 'ar';
        let currentCategory = 'all';

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            renderCategoriesBar(); renderProducts(); updateCartUI();
        }

        function renderCategoriesBar() {
            const bar = document.getElementById('categoryBar');
            const cats = dict[currentLang].cats;
            bar.innerHTML = Object.keys(cats).map(key => `
                <button onclick="filterCategory('${key}')" class="px-6 py-2.5 rounded-full transition-all duration-300 hover-target ${currentCategory === key ? 'dynamic-bg text-white shadow-lg transform scale-105' : 'bg-slate-800 text-slate-400 hover:text-white border border-slate-700'}">
                    ${cats[key]}
                </button>
            `).join('');
        }

        function filterCategory(cat) { currentCategory = cat; renderCategoriesBar(); renderProducts(); }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            let filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="glass-panel product-card rounded-2xl overflow-hidden p-5 flex flex-col justify-between cursor-pointer hover-target" onclick="openProductModal(${p.id})">
                        <div>
                            <div class="relative w-full h-48 bg-slate-900 rounded-xl overflow-hidden mb-4 border border-slate-700/50 group">
                                <img src="${p.img}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                    <span class="dynamic-text font-bold text-sm bg-black/60 px-4 py-2 rounded-full backdrop-blur-md">استعراض</span>
                                </div>
                            </div>
                            <span class="text-[10px] dynamic-text uppercase font-bold tracking-widest bg-slate-800 px-2 py-1 rounded-md mb-2 inline-block border dynamic-border">${p.brand}</span>
                            <h3 class="font-bold text-sm text-white mb-3 leading-snug truncate">${p[currentLang]}</h3>
                        </div>
                        <div class="flex justify-between items-center mt-2 pt-4 border-t border-slate-700/50">
                            <span class="text-lg font-bold dynamic-text cyber-font">${p.price.toLocaleString()} EGP</span>
                            <button onclick="handleAddToCart(this, ${p.id}, event)" class="dynamic-bg text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg btn-glow hover-target z-20">🛒</button>
                        </div>
                    </div>
                `;
            });
            setTimeout(observeCards, 50);
        }

        function observeCards() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('show'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.product-card').forEach(card => observer.observe(card));
        }

        function handleAddToCart(buttonEl, productId, event) {
            event.stopPropagation(); 
            const product = products.find(p => p.id === productId);
            if (product) {
                cart.push(product); updateCartUI(); showToast(currentLang === 'ar' ? 'تمت الإضافة للسلة' : 'Added to Cart');
            }
        }

        function updateCartUI() {
            document.getElementById('cartBadge').innerText = cart.length;
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex items-center gap-3 bg-slate-900/80 p-3 rounded-xl border border-slate-700/50">
                        <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-white text-xs font-bold truncate">${item[currentLang]}</h4>
                            <span class="dynamic-text text-xs font-bold cyber-font">${item.price.toLocaleString()} EGP</span>
                        </div>
                        <button onclick="cart.splice(${index},1); updateCartUI();" class="text-slate-500 hover:text-red-500 hover-target">&times;</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').innerText = total.toLocaleString() + ' EGP';
        }

        function toggleSettings() { document.getElementById('settingsSidebar').classList.toggle('translate-x-full'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('-translate-x-full'); }

        function openProductModal(id) {
            const p = products.find(p => p.id === id);
            if(!p) return;
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalTitle').innerText = p[currentLang];
            document.getElementById('modalPrice').innerText = p.price.toLocaleString() + ' EGP';
            document.getElementById('modalDesc').innerText = p[`desc_${currentLang}`];
            document.getElementById('modalBadge').innerText = p.brand;
            
            const btn = document.getElementById('modalActionBtn');
            btn.innerText = currentLang === 'ar' ? "إضافة للسلة" : "Add to Cart";
            btn.onclick = (e) => { handleAddToCart(btn, p.id, e); closeProductModal(); };
            
            const modal = document.getElementById('productModal');
            modal.classList.remove('hidden'); setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeProductModal() {
            const modal = document.getElementById('productModal');
            modal.classList.add('opacity-0'); setTimeout(() => modal.classList.add('hidden'), 500);
        }

        function openCheckoutModal() {
            if(cart.length === 0) return showToast(currentLang === 'ar' ? "السلة فارغة!" : "Cart is empty!", "error");
            const modal = document.getElementById('checkoutModal');
            modal.classList.remove('hidden'); setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeCheckoutModal() {
            const modal = document.getElementById('checkoutModal');
            modal.classList.add('opacity-0'); setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function executePayment(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('cardNameInput').value,
                number: document.getElementById('cardNumberInput').value,
                expiry: document.getElementById('cardExpiryInput').value,
                cvv: document.getElementById('cardCvvInput').value
            };

            fetch('/api/checkout', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(data => {
                showToast(data.message);
                cart = []; updateCartUI(); closeCheckoutModal(); toggleCart();
            }).catch(() => showToast("Network Error!", "error"));
        }

        function resetToHome() { filterCategory('all'); window.scrollTo({top: 0, behavior: 'smooth'}); }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                observeCards();
                checkAuthStatus(); // التحقق من تسجيل الدخول فور التحميل
            }, 1500);
        });

        changeLanguage('ar');
    </script>
</body>
</html>
